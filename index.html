<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.0">
    <script src="main.js?v=2.0" defer></script>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js')
                .then(() => console.log('Service Worker Registered'))
                .catch(err => console.error('Service Worker Registration failed:', err));
        }
    </script>
</head>
<body>
    <h1>🃏 Memory Game</h1>
    <div id="move-counter">翻牌次数 = 0</div>

    <div id="game-container">
        <!-- Memory game grid will be rendered here -->
    </div>

    <div id="controls">
        <label for="difficulty-slider">难度：<span id="difficulty-label">超易</span></label>
        <input type="range" id="difficulty-slider" min="1" max="5" value="1"><br>
        <div class="button-row">
            <button id="start-button">开始游戏</button>
            <button id="rules-button">游戏规则</button>
        </div>
    </div>

    <div id="message"></div>

    <!-- Rules Modal -->
    <div id="rules-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>🎮 游戏规则</h2>
            <p>记忆游戏是一款挑战记忆力的游戏，规则如下：</p>
            <ul>
                <li>所有卡片开始时都面朝下放置</li>
                <li>每次翻开两张卡片，找到相同的配对卡片</li>
                <li>如果两张卡片不同，它们会翻回面朝下</li>
                <li>用最少的次数找到所有配对卡片即为成功</li>
            </ul>
        </div>
    </div>
</body>
</html>
